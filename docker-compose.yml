services:
  postgres:
    image: postgres:16-alpine
    container_name: my-notion-go-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: my_notion_go
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d my_notion_go"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: my-notion-go-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: my-notion-go-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: deployments/docker/api.Dockerfile
    container_name: my-notion-go-migrate
    command: ["./migrate"]
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/my_notion_go?sslmode=disable
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: my_notion_go_chunks
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - app

  api:
    build:
      context: .
      dockerfile: deployments/docker/api.Dockerfile
    container_name: my-notion-go-api
    environment:
      APP_ENV: production
      HTTP_ADDR: :8080
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/my_notion_go?sslmode=disable
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5273,http://localhost:8081}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-access-secret}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-refresh-secret}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_API_BASE_URL: ${DASHSCOPE_API_BASE_URL:-https://dashscope.aliyuncs.com/api/v1}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-my_notion_go_chunks}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - app

  worker:
    build:
      context: .
      dockerfile: deployments/docker/api.Dockerfile
    container_name: my-notion-go-worker
    command: ["./worker"]
    environment:
      APP_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/my_notion_go?sslmode=disable
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:-}
      DASHSCOPE_API_BASE_URL: ${DASHSCOPE_API_BASE_URL:-https://dashscope.aliyuncs.com/api/v1}
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-my_notion_go_chunks}
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    profiles:
      - app

  web:
    build:
      context: .
      dockerfile: deployments/docker/web.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: my-notion-go-web
    ports:
      - "8081:80"
    depends_on:
      api:
        condition: service_healthy
    profiles:
      - app

volumes:
  postgres_data:
  qdrant_data:
